<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUS Temperature Climatology Tool — MetraWeather</title>
<style>
  /* ── Tokens ──────────────────────────────────────────────────────────── */
  :root {
    --navy:    #0a1628;
    --navy2:   #0f2040;
    --navy3:   #162b52;
    --cyan:    #00aeef;
    --cyan2:   #0090cc;
    --white:   #f0f4f8;
    --muted:   #7a9bb5;
    --border:  rgba(0,174,239,0.18);
    --card:    rgba(15,32,64,0.85);

    --tmax:  #ef5350;
    --tmean: #00aeef;
    --tmin:  #42a5f5;

    --font-head: 'DM Mono', 'Courier New', monospace;
    --font-body: 'IBM Plex Sans', 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,174,239,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,174,239,0.04) 39px, rgba(0,174,239,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,174,239,0.04) 39px, rgba(0,174,239,0.04) 40px);
  }

  /* ── Layout ──────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.9);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 1rem; }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--cyan);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head);
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--navy);
    flex-shrink: 0;
  }

  .header-title {
    font-family: var(--font-head);
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    color: var(--white);
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .badge {
    font-family: var(--font-head);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cyan);
    border: 1px solid var(--border);
    padding: 0.25rem 0.65rem;
    border-radius: 2px;
  }

  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* ── Controls panel ──────────────────────────────────────────────────── */
  .controls-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    backdrop-filter: blur(6px);
  }

  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 2rem;
    align-items: end;
  }

  .control-group label {
    display: block;
    font-family: var(--font-head);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  /* ── Dual range slider ───────────────────────────────────────────────── */
  .range-wrap {
    position: relative;
    height: 44px;
    margin-top: 0.3rem;
  }

  .range-wrap input[type=range] {
    -webkit-appearance: none;
    position: absolute;
    width: 100%;
    height: 4px;
    top: 20px;
    background: transparent;
    pointer-events: none;
    outline: none;
  }

  .range-track {
    position: absolute;
    width: 100%;
    height: 4px;
    top: 20px;
    background: var(--navy3);
    border-radius: 2px;
  }

  .range-fill {
    position: absolute;
    height: 4px;
    top: 20px;
    background: var(--cyan);
    border-radius: 2px;
    pointer-events: none;
  }

  .range-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--cyan);
    border: 3px solid var(--navy);
    box-shadow: 0 0 0 1px var(--cyan);
    cursor: pointer;
    pointer-events: all;
    position: relative;
    z-index: 2;
  }

  .range-wrap input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--cyan);
    border: 3px solid var(--navy);
    cursor: pointer;
    pointer-events: all;
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-head);
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.3rem;
    padding-top: 28px;
  }

  .range-value {
    font-family: var(--font-head);
    font-size: 1rem;
    color: var(--cyan);
    letter-spacing: 0.05em;
  }

  /* ── Variable toggle ─────────────────────────────────────────────────── */
  .var-toggle {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.3rem;
  }

  .var-btn {
    font-family: var(--font-head);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .var-btn:hover { border-color: var(--cyan); color: var(--white); }

  .var-btn.active[data-var=tmax] { background: rgba(239,83,80,0.2); border-color: var(--tmax); color: var(--tmax); }
  .var-btn.active[data-var=tmean] { background: rgba(0,174,239,0.2); border-color: var(--tmean); color: var(--tmean); }
  .var-btn.active[data-var=tmin] { background: rgba(66,165,245,0.2); border-color: var(--tmin); color: var(--tmin); }

  .prev-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    color: var(--muted);
    cursor: pointer;
    margin-top: 0.8rem;
    user-select: none;
  }

  .prev-toggle input { accent-color: var(--cyan); cursor: pointer; }
  .prev-toggle:hover { color: var(--white); }

  /* ── Stats strip ─────────────────────────────────────────────────────── */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .stat-cell {
    background: var(--card);
    padding: 0.9rem 1.2rem;
    text-align: center;
  }

  .stat-city {
    font-family: var(--font-head);
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .stat-anom {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .pos { color: var(--tmax); }
  .neg { color: var(--tmin); }
  .neu { color: var(--muted); }

  /* ── Chart grid ──────────────────────────────────────────────────────── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.2rem 1.4rem 1rem;
    backdrop-filter: blur(4px);
  }

  .chart-title {
    font-family: var(--font-head);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 0.8rem;
  }

  .chart-subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: -0.5rem;
    margin-bottom: 0.8rem;
  }

  svg.box-chart { width: 100%; overflow: visible; }

  /* ── Station note ────────────────────────────────────────────────────── */
  .station-note {
    display: none;
    font-size: 0.68rem;
    color: #f0c040;
    background: rgba(240,192,64,0.08);
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 3px;
    padding: 0.4rem 0.8rem;
    margin-top: 1rem;
  }

  /* ── Loading / error ─────────────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    font-family: var(--font-head);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1.2s step-start infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .error-msg {
    background: rgba(239,83,80,0.1);
    border: 1px solid rgba(239,83,80,0.3);
    border-radius: 4px;
    padding: 1rem 1.5rem;
    font-size: 0.8rem;
    color: #ef9090;
    margin: 2rem 0;
  }

  /* ── Legend ──────────────────────────────────────────────────────────── */
  .legend {
    display: flex;
    gap: 1.5rem;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-box { width: 14px; height: 10px; border-radius: 2px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-line { width: 20px; height: 2px; }

  @media (max-width: 768px) {
    .controls-row { grid-template-columns: 1fr; }
    .chart-grid { grid-template-columns: 1fr; }
    .stats-strip { grid-template-columns: 1fr 1fr; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">MW</div>
    <div>
      <div class="header-title">Temperature Climatology</div>
      <div class="header-sub">Australian Consult Team</div>
    </div>
  </div>
  <div class="badge">MetraWeather</div>
</header>

<main>
  <div id="loading" class="loading">
    Loading data<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
  </div>

  <div id="error" class="error-msg" style="display:none"></div>

  <div id="app" style="display:none">

    <!-- Controls -->
    <div class="controls-panel">
      <div class="controls-row">
        <div class="control-group">
          <label>Climatology Window</label>
          <div class="range-value" id="rangeDisplay">1996 – 2025</div>
          <div class="range-wrap">
            <div class="range-track"></div>
            <div class="range-fill" id="rangeFill"></div>
            <input type="range" id="sliderStart" min="1996" max="2025" value="1996" step="1">
            <input type="range" id="sliderEnd"   min="1996" max="2025" value="2025" step="1">
          </div>
          <div class="range-labels">
            <span>1996</span><span>2025</span>
          </div>
        </div>

        <div class="control-group">
          <label>Variable</label>
          <div class="var-toggle">
            <button class="var-btn active" data-var="tmax" onclick="setVar('tmax')">Tmax</button>
            <button class="var-btn" data-var="tmean" onclick="setVar('tmean')">Tmean</button>
            <button class="var-btn" data-var="tmin" onclick="setVar('tmin')">Tmin</button>
          </div>
          <label class="prev-toggle">
            <input type="checkbox" id="showPrev" onchange="redraw()">
            Show previous month's forecast
          </label>
        </div>

        <div class="control-group">
          <label>Window size</label>
          <div style="font-family:var(--font-head);font-size:1.8rem;color:var(--cyan);letter-spacing:-0.02em" id="windowSize">30 yrs</div>
        </div>
      </div>

      <div class="station-note" id="stationNote"></div>
    </div>

    <!-- Stats strip -->
    <div class="stats-strip" id="statsStrip"></div>

    <!-- Charts -->
    <div class="chart-grid" id="chartGrid"></div>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-box" style="background:rgba(0,174,239,0.25);border:1px solid rgba(0,174,239,0.4)"></div>
        <span>IQR (25–75th pct)</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:var(--cyan);opacity:0.5"></div>
        <span>Min–Max range</span>
      </div>
      <div class="legend-item">
        <div class="legend-line" style="background:var(--white)"></div>
        <span>Climo mean</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:#ffcc00;box-shadow:0 0 4px #ffcc00"></div>
        <span>Current forecast</span>
      </div>
      <div class="legend-item" id="prevLegend" style="display:none">
        <div class="legend-dot" style="background:#ff9944;box-shadow:0 0 4px #ff9944;opacity:0.7"></div>
        <span>Previous month forecast</span>
      </div>
    </div>

  </div>
</main>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
// UPDATE THESE URLS after uploading files to your GitHub repo
// Format: https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/FILENAME
const OBS_URL      = 'https://raw.githubusercontent.com/2manytims/aus-temp-climatology/main/obs_data.csv';
const FORECAST_URL = 'https://raw.githubusercontent.com/2manytims/aus-temp-climatology/main/AusSeasonalTempPlusPrev.csv';

const CITIES = ['Adelaide', 'Archerfield', 'Bankstown', 'Melbourne'];

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Station changeover years — used to warn user when window crosses these
const STATION_CHANGES = {
  Adelaide: { year: 2017, note: 'Adelaide: data before 2017 is from Kent Town station, 2017 onwards from West Terrace.' },
  Melbourne: { year: 2013, note: 'Melbourne: data before 2013 is from Regional Office (CBD), 2013 onwards from Olympic Park.' },
};

// ── State ──────────────────────────────────────────────────────────────────
let obsData      = [];   // [{location, year, month, tmax, tmin, tmean}, ...]
let forecastData = [];   // [{location, month_str, month_num, year, tmax, tmin, tmean, prev_tmax, prev_tmin, prev_tmean}, ...]
let activeVar    = 'tmax';
let startYear    = 1996;
let endYear      = 2025;

// ── CSV parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = l.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [obsText, fcText] = await Promise.all([
      fetch(OBS_URL).then(r => { if (!r.ok) throw new Error(`obs_data.csv: ${r.status}`); return r.text(); }),
      fetch(FORECAST_URL).then(r => { if (!r.ok) throw new Error(`AusSeasonalTempPlusPrev.csv: ${r.status}`); return r.text(); }),
    ]);

    // Parse obs
    const rawObs = parseCSV(obsText);
    obsData = rawObs.map(r => ({
      location: r.location,
      year:     +r.year,
      month:    +r.month,
      tmax:     parseFloat(r.tmax),
      tmin:     parseFloat(r.tmin),
      tmean:    parseFloat(r.tmean),
    }));

    // Parse forecast
    // Month column is like "June 2026"
    const rawFc = parseCSV(fcText);
    forecastData = rawFc.map(r => {
      const parts = r.Month.split(' ');
      const monthNum = MONTH_NAMES.indexOf(parts[0].slice(0,3)) + 1;
      return {
        location:   r.Location,
        month_str:  r.Month,
        month_num:  monthNum,
        year:       +parts[1],
        tmax:       parseFloat(r.MaxTemp),
        tmean:      parseFloat(r.MeanTemp),
        tmin:       parseFloat(r.MinTemp),
        prev_tmax:  parseFloat(r.PrevMonthMax),
        prev_tmean: parseFloat(r.PrevMonthMean),
        prev_tmin:  parseFloat(r.PrevMonthMin),
      };
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initSliders();
    redraw();

  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML =
      `<strong>Could not load data.</strong><br>${err.message}<br><br>` +
      `Check that obs_data.csv and AusSeasonalTempPlusPrev.csv have been uploaded to the GitHub repo, ` +
      `and that the URLs in this file are correct.`;
  }
}

// ── Sliders ────────────────────────────────────────────────────────────────
function initSliders() {
  const s = document.getElementById('sliderStart');
  const e = document.getElementById('sliderEnd');
  s.addEventListener('input', onSlider);
  e.addEventListener('input', onSlider);
  updateFill();
}

function onSlider() {
  let s = +document.getElementById('sliderStart').value;
  let e = +document.getElementById('sliderEnd').value;
  // Enforce minimum 1 year gap
  if (s >= e) {
    if (this === document.getElementById('sliderStart')) s = e - 1;
    else e = s + 1;
    document.getElementById('sliderStart').value = s;
    document.getElementById('sliderEnd').value = e;
  }
  startYear = s;
  endYear   = e;
  document.getElementById('rangeDisplay').textContent = `${s} – ${e}`;
  document.getElementById('windowSize').textContent   = `${e - s + 1} yr${e-s+1===1?'':'s'}`;
  updateFill();
  checkStationNote();
  redraw();
}

function updateFill() {
  const min = 1996, max = 2025, range = max - min;
  const s = +document.getElementById('sliderStart').value;
  const e = +document.getElementById('sliderEnd').value;
  const fill = document.getElementById('rangeFill');
  const left  = ((s - min) / range * 100).toFixed(1);
  const right = ((e - min) / range * 100).toFixed(1);
  fill.style.left  = left + '%';
  fill.style.width = (right - left) + '%';
}

function checkStationNote() {
  const notes = [];
  for (const [city, info] of Object.entries(STATION_CHANGES)) {
    if (startYear < info.year && endYear >= info.year) notes.push(info.note);
  }
  const el = document.getElementById('stationNote');
  if (notes.length) {
    el.style.display = 'block';
    el.innerHTML = '⚠ Station note — ' + notes.join(' | ');
  } else {
    el.style.display = 'none';
  }
}

// ── Variable toggle ────────────────────────────────────────────────────────
function setVar(v) {
  activeVar = v;
  document.querySelectorAll('.var-btn').forEach(b => b.classList.toggle('active', b.dataset.var === v));
  redraw();
}

// ── Stats & charts ─────────────────────────────────────────────────────────
function getClimoStats(location, monthNum) {
  const vals = obsData
    .filter(r => r.location === location && r.month === monthNum && r.year >= startYear && r.year <= endYear)
    .map(r => r[activeVar])
    .filter(v => !isNaN(v))
    .sort((a,b) => a-b);
  if (!vals.length) return null;
  const n = vals.length;
  const mean = vals.reduce((a,b) => a+b,0) / n;
  const q1   = vals[Math.floor(n * 0.25)];
  const q3   = vals[Math.floor(n * 0.75)];
  return { mean, min: vals[0], max: vals[n-1], q1, q3, n };
}

function redraw() {
  drawStats();
  drawCharts();
  document.getElementById('prevLegend').style.display =
    document.getElementById('showPrev').checked ? 'flex' : 'none';
}

function drawStats() {
  const strip = document.getElementById('statsStrip');
  // Use the first forecast month for the stats strip overview
  strip.innerHTML = CITIES.map(city => {
    const fc = forecastData.find(r => r.location === city);
    if (!fc) return `<div class="stat-cell"><div class="stat-city">${city}</div><div class="stat-value neu">—</div></div>`;
    const stats = getClimoStats(city, fc.month_num);
    const val = fc[activeVar];
    const anom = stats ? (val - stats.mean).toFixed(1) : null;
    const cls  = anom > 0.5 ? 'pos' : anom < -0.5 ? 'neg' : 'neu';
    const sign = anom > 0 ? '+' : '';
    const varLabel = { tmax: 'Tmax', tmean: 'Tmean', tmin: 'Tmin' }[activeVar];
    return `
      <div class="stat-cell">
        <div class="stat-city">${city}</div>
        <div class="stat-value ${cls}">${val.toFixed(1)}°</div>
        <div class="stat-anom">${fc.month_str} ${varLabel} ${anom!=null ? `<span class="${cls}">${sign}${anom} vs ${startYear}–${endYear}</span>` : ''}</div>
      </div>`;
  }).join('');
}

function drawCharts() {
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = CITIES.map(city => {
    const cityFc = forecastData.filter(r => r.location === city);
    if (!cityFc.length) return '';
    const showPrev = document.getElementById('showPrev').checked;

    const W = 480, H = 200, PL = 38, PR = 10, PT = 16, PB = 28;
    const cw = W - PL - PR;
    const ch = H - PT - PB;
    const n = cityFc.length;

    // Collect all values to set y scale
    let allVals = [];
    cityFc.forEach(fc => {
      const stats = getClimoStats(city, fc.month_num);
      if (stats) allVals.push(stats.min, stats.max, stats.mean);
      if (!isNaN(fc[activeVar])) allVals.push(fc[activeVar]);
      if (showPrev) {
        const pv = fc[`prev_${activeVar}`];
        if (!isNaN(pv)) allVals.push(pv);
      }
    });
    if (!allVals.length) return '';

    const yMin = Math.min(...allVals) - 1;
    const yMax = Math.max(...allVals) + 1;
    const yScale = v => PT + ch - ((v - yMin) / (yMax - yMin)) * ch;
    const xScale = i => PL + (i + 0.5) * (cw / n);

    const varColor = { tmax: '#ef5350', tmean: '#00aeef', tmin: '#42a5f5' }[activeVar];

    // Build SVG elements
    let svgParts = [];

    // Y gridlines
    const yTicks = 4;
    for (let i = 0; i <= yTicks; i++) {
      const v = yMin + (yMax - yMin) * i / yTicks;
      const y = yScale(v);
      svgParts.push(`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(122,155,181,0.15)" stroke-width="1"/>`);
      svgParts.push(`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#7a9bb5" font-family="DM Mono,monospace">${v.toFixed(0)}</text>`);
    }

    // Per forecast month
    cityFc.forEach((fc, i) => {
      const x = xScale(i);
      const bw = (cw / n) * 0.55;
      const stats = getClimoStats(city, fc.month_num);

      if (stats) {
        // Range line (min–max)
        const yMn = yScale(stats.min), yMx = yScale(stats.max);
        svgParts.push(`<line x1="${x}" y1="${yMn}" x2="${x}" y2="${yMx}" stroke="${varColor}" stroke-width="1.5" stroke-opacity="0.3"/>`);

        // IQR box
        const yQ1 = yScale(stats.q1), yQ3 = yScale(stats.q3);
        svgParts.push(`<rect x="${x - bw/2}" y="${yQ3}" width="${bw}" height="${yQ1 - yQ3}" fill="${varColor}" fill-opacity="0.18" stroke="${varColor}" stroke-opacity="0.45" stroke-width="1" rx="1"/>`);

        // Mean line
        const yM = yScale(stats.mean);
        svgParts.push(`<line x1="${x - bw/2}" y1="${yM}" x2="${x + bw/2}" y2="${yM}" stroke="rgba(240,244,248,0.85)" stroke-width="1.5"/>`);
      }

      // Previous forecast dot
      if (showPrev) {
        const pv = fc[`prev_${activeVar}`];
        if (!isNaN(pv)) {
          const yP = yScale(pv);
          svgParts.push(`<circle cx="${x}" cy="${yP}" r="4.5" fill="#ff9944" fill-opacity="0.7" stroke="#ff9944" stroke-width="1"/>`);
        }
      }

      // Current forecast dot
      const cv = fc[activeVar];
      if (!isNaN(cv)) {
        const yC = yScale(cv);
        svgParts.push(`<circle cx="${x}" cy="${yC}" r="5.5" fill="#ffcc00" stroke="#ffcc00" stroke-width="1" filter="url(#glow)"/>`);
        // Value label
        svgParts.push(`<text x="${x}" y="${yC - 9}" text-anchor="middle" font-size="9.5" fill="#ffcc00" font-family="DM Mono,monospace" font-weight="500">${cv.toFixed(1)}</text>`);
      }

      // Month label
      const mLabel = MONTH_NAMES[fc.month_num - 1];
      svgParts.push(`<text x="${x}" y="${H - 4}" text-anchor="middle" font-size="9" fill="#7a9bb5" font-family="DM Mono,monospace">${mLabel}</text>`);
    });

    return `
      <div class="chart-card">
        <div class="chart-title">${city}</div>
        <div class="chart-subtitle">${startYear}–${endYear} climatology vs current forecast</div>
        <svg class="box-chart" viewBox="0 0 ${W} ${H}">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          ${svgParts.join('')}
        </svg>
      </div>`;
  }).join('');
}

// ── Init ────────────────────────────────────────────────────────────────────
loadData();
</script>
